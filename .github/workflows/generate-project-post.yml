name: Generate Project Post

# ──────────────────────────────────────────────────────────────────────────────
# Permissions
# ──────────────────────────────────────────────────────────────────────────────
# contents: write   – needed to push the automation branch in publish mode
# pull-requests: write – needed to open / update the PR in publish mode
#
# NOTE: You must also enable "Allow GitHub Actions to create and approve pull
# requests" under Settings → Actions → General → Workflow permissions.
# ──────────────────────────────────────────────────────────────────────────────
permissions:
  contents: write
  pull-requests: write

on:
  workflow_dispatch:
    inputs:
      publish:
        description: >
          false = preview only (artifact + summary, no push).
          true  = create/update branch and open PR.
        type: boolean
        default: false
        required: true

# ──────────────────────────────────────────────────────────────────────────────
# Tuneable constants – edit these to reuse this workflow in another repository
# ──────────────────────────────────────────────────────────────────────────────
env:
  OUTPUT_PATH: project.md
  PR_BRANCH: automation/project-post
  PR_TITLE: "docs: add / update project.md"
  PR_LABEL: documentation
  PYTHON_VERSION: "3.11"
  # Set AI_MODEL to a real model name and provide AI_API_KEY as a secret
  # to replace the placeholder generator with an actual LLM call.
  AI_MODEL: placeholder

jobs:
  generate:
    name: Generate project.md
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Set up Python ─────────────────────────────────────────────────
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # ── 3. Generate project.md ───────────────────────────────────────────
      - name: Generate project.md
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          OUTPUT_PATH: ${{ env.OUTPUT_PATH }}
          AI_MODEL: ${{ env.AI_MODEL }}
          # Uncomment and add the secret when using a real LLM:
          # AI_API_KEY: ${{ secrets.AI_API_KEY }}
        run: python .github/scripts/generate_project_post.py

      # ── 4. Validate output ───────────────────────────────────────────────
      - name: Validate project.md
        run: python .github/scripts/validate_project_post.py "${{ env.OUTPUT_PATH }}"

      # ── 5. Write job summary (always) ────────────────────────────────────
      - name: Write preview to job summary
        run: |
          echo "## project.md preview" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```markdown' >> "$GITHUB_STEP_SUMMARY"
          cat "${{ env.OUTPUT_PATH }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ inputs.publish }}" = "true" ]; then
            echo "> **Publish mode** – a branch and PR will be created." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "> **Preview mode** – no branch or PR was created." >> "$GITHUB_STEP_SUMMARY"
          fi

      # ── 6. Upload artifact (always, for human review) ────────────────────
      - name: Upload project.md as artifact
        uses: actions/upload-artifact@v4
        with:
          name: project-md-preview
          path: ${{ env.OUTPUT_PATH }}
          retention-days: 7

      # ── 7. Detect content changes (publish mode only) ────────────────────
      - name: Check for changes
        if: inputs.publish == true
        id: diff
        run: |
          git diff --quiet HEAD -- "${{ env.OUTPUT_PATH }}" \
            && echo "changed=false" >> "$GITHUB_OUTPUT" \
            || echo "changed=true"  >> "$GITHUB_OUTPUT"

      # ── 8. Open / update PR (publish mode, changes only) ─────────────────
      - name: Create or update pull request
        if: inputs.publish == true && steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ env.PR_BRANCH }}
          commit-message: "docs: regenerate project.md [skip ci]"
          title: ${{ env.PR_TITLE }}
          body: |
            ## Automated project.md update

            This PR was generated by the **Generate Project Post** workflow.

            ### What changed
            - `project.md` was regenerated from the current repository context.

            ### Review checklist
            - [ ] Frontmatter fields (`title`, `date`, `repo`, `tags`, `summary`) are correct
            - [ ] Sections are complete and accurate
            - [ ] Assumptions marked with `<!-- assumption: … -->` have been reviewed
            - [ ] Links are valid

            ---
            *Triggered by: @${{ github.actor }} on `${{ github.ref_name }}`*
          labels: ${{ env.PR_LABEL }}
          add-paths: ${{ env.OUTPUT_PATH }}
          delete-branch: true

      # ── 9. No-op notice when nothing changed ─────────────────────────────
      - name: No changes detected
        if: inputs.publish == true && steps.diff.outputs.changed == 'false'
        run: |
          echo "project.md is already up to date. No PR created." | tee -a "$GITHUB_STEP_SUMMARY"
